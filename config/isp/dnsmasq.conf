# ISP DNS server configuration
# Forwards legitimate queries upstream, poisons blocked domains

# Don't read /etc/resolv.conf — we set upstream servers explicitly
no-resolv

# Upstream DNS server: the backbone's DNS forwarder.
# Queries traverse the simulated network: ISP -> IXP -> Backbone -> real internet.
# This ensures that cutting the ISP-IXP link also kills DNS resolution.
server=10.0.3.1

# Load the blocklist
conf-file=/etc/dnsmasq.d/blocklist.conf

# Log queries for debugging (can be commented out in production)
log-queries
log-facility=/var/log/dnsmasq.log
