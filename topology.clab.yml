name: iran-filtering

# Miniature topology modeling Iran's internet architecture in a single-region slice.
# Preserves the key structural concepts from the realistic multi-region topology
# while remaining lightweight enough for local development and CI testing.
#
# ── Network Plane Architecture ────────────────────────────────────────────
#
#   [TRANSIT PLANE] — International traffic path (north-south, TIC-controlled)
#     iran-client → isp-shatel → tehran-ix → tic-tehran → internet-srv
#     tic-tehran is the national chokepoint: all DPI, SNI filtering, IP blocking,
#     and bandwidth control run here. Shutdown = cut tic-tehran's upstream route.
#
#   [PEERING PLANE] — Domestic traffic path (east-west, IX-mediated, NIN)
#     iran-client → isp-shatel → tehran-ix → aparat-server
#     aparat-server connects DIRECTLY to tehran-ix (eth3, 10.10.10.0/24).
#     NIN traffic does NOT pass through tic-tehran; it survives international shutdowns.
#     This reflects real-world Jan 2026 behavior: domestic banking/Eitaa/Rubika
#     remained up while all international transit was severed.
#
#   [TRANSIT/PEERING handoff] — tehran-ix bridges both planes
#     tehran-ix sits between tic-tehran (transit) and isp-shatel + aparat-server (peering).
#     It is also the "kill switch" point: dropping tehran-ix→isp-shatel traffic
#     severs all connectivity (transit AND peering) to the end user.
#
# ── Node roles ────────────────────────────────────────────────────────────
#   tic-tehran   — TIC backbone / GFW layer (AS49666). DPI, SNI filtering,
#                  IP blocking, protocol interference. No direct int'l gateway
#                  in this slice; connects to internet-srv directly for testing.
#   tehran-ix    — Tehran Internet Exchange. Peering point for ISPs and NIN.
#                  Also the kill-switch enforcement point (7.1).
#   isp-shatel   — Shatel (AS48434). Major fixed-line residential ISP in Tehran.
#                  DNS filtering, local routing, CGNAT for mobile subscribers.
#   aparat-server — NIN domestic content server (Aparat/Rubika equivalent).
#                  Directly peered with tehran-ix; reachable during int'l shutdown.
#   internet-srv — Simulated global internet server (203.0.113.0/24).
#
# ── IP addressing scheme ──────────────────────────────────────────────────
#   10.0.1.0/24   — iran-client ↔ isp-shatel        (client subnet)
#   10.0.2.0/24   — isp-shatel ↔ tehran-ix           [PEERING PLANE]
#   10.0.3.0/24   — tehran-ix ↔ tic-tehran           [TRANSIT/PEERING handoff]
#   10.0.4.0/24   — isp-shatel ↔ client-android      (mobile subscriber subnet)
#   10.10.10.0/24 — tehran-ix ↔ aparat-server        [PEERING PLANE / NIN]
#   203.0.113.0/24 — tic-tehran ↔ internet-srv       [TRANSIT PLANE]
#
# Deploy:  clab deploy
# Destroy: clab destroy

topology:
  nodes:

    # ── End User ──────────────────────────────────────────────────────────
    iran-client:
      kind: linux
      image: iran-sim:latest
      exec:
        - ip addr add 10.0.1.2/24 dev eth1
        - ip route replace default via 10.0.1.1
        # - bash -c 'printf "nameserver 8.8.8.8\noptions use-vc\n" > /etc/resolv.conf'    # OrbStack: force TCP DNS
        # - bash -c 'echo "precedence ::ffff:0:0/96 100" >> /etc/gai.conf'                # OrbStack: prefer IPv4

    # ── Local ISP (Shatel, AS48434) ───────────────────────────────────────
    # Role: DNS filtering, local routing, mobile subscriber DHCP
    isp-shatel:
      kind: linux
      image: iran-sim:latest
      labels:
        containerlab.env.IRAN_MOBILE: "${IRAN_MOBILE}"
      binds:
        - config/isp/dnsmasq.conf:/etc/dnsmasq.conf:ro
        - config/isp/blocklist.conf:/etc/dnsmasq.d/blocklist.conf:ro
        - config/isp/nftables.conf:/etc/nftables.conf:ro
      exec:
        - sysctl -w net.ipv4.ip_forward=1
        - ip addr add 10.0.1.1/24 dev eth1  # toward iran-client
        - ip addr add 10.0.2.2/24 dev eth2  # toward tehran-ix   [PEERING PLANE]
        - bash -c 'if [ "${IRAN_MOBILE:-false}" = "true" ]; then ip addr add 10.0.4.1/24 dev eth3; fi'  # toward client-android
        - ip route replace default via 10.0.2.1
        - bash -c 'dnsmasq --conf-file=/dev/null -C /etc/dnsmasq.conf'
        - nft -f /etc/nftables.conf

    # ── Tehran Internet Exchange ──────────────────────────────────────────
    # Role: Peering point for ISPs and NIN. Kill-switch enforcement point (7.1).
    # [TRANSIT/PEERING handoff node]
    # eth1 -> isp-shatel:  peering plane (ISP downstream)
    # eth2 -> tic-tehran:  transit plane (international upstream)
    # eth3 -> aparat-server: peering plane (NIN directly, survives int'l shutdown)
    tehran-ix:
      kind: linux
      image: iran-sim:latest
      labels:
        containerlab.env.IRAN_MOBILE: "${IRAN_MOBILE}"
      exec:
        - sysctl -w net.ipv4.ip_forward=1
        - ip addr add 10.0.2.1/24 dev eth1  # toward isp-shatel  [PEERING PLANE]
        - ip addr add 10.0.3.2/24 dev eth2  # toward tic-tehran  [TRANSIT/PEERING handoff]
        - ip addr add 10.10.10.1/24 dev eth3  # toward aparat-server  [PEERING PLANE / NIN]
        - ip route replace 10.0.1.0/24 via 10.0.2.2  # route back to client
        - bash -c 'if [ "${IRAN_MOBILE:-false}" = "true" ]; then ip route replace 10.0.4.0/24 via 10.0.2.2; fi'  # route back to mobile
        - ip route replace default via 10.0.3.1

    # ── TIC Tehran Backbone / GFW Layer (AS49666) ─────────────────────────
    # Role: SNI filtering, DPI, IP blocking, protocol interference.
    # National chokepoint — all international traffic passes through here.
    tic-tehran:
      kind: linux
      image: iran-sim:latest
      labels:
        containerlab.env.IRAN_MOBILE: "${IRAN_MOBILE}"
      binds:
        - config/backbone/dnsmasq.conf:/etc/dnsmasq.conf:ro
        - config/backbone/nftables.conf:/etc/nftables.conf:ro
      exec:
        - sysctl -w net.ipv4.ip_forward=1
        - ip addr add 10.0.3.1/24 dev eth1  # toward tehran-ix   [TRANSIT/PEERING handoff]
        - ip addr add 203.0.113.1/24 dev eth2  # toward internet-srv  [TRANSIT PLANE]
        - ip route replace 10.0.2.0/24 via 10.0.3.2
        - ip route replace 10.0.1.0/24 via 10.0.3.2
        - bash -c 'if [ "${IRAN_MOBILE:-false}" = "true" ]; then ip route replace 10.0.4.0/24 via 10.0.3.2; fi'
        - nft -f /etc/nftables.conf
        - bash -c 'dnsmasq --conf-file=/dev/null -C /etc/dnsmasq.conf'

    # ── Global Internet Server ─────────────────────────────────────────────
    internet-srv:
      kind: linux
      image: iran-sim:latest
      exec:
        - ip addr add 203.0.113.2/24 dev eth1
        - ip addr add 203.0.113.10/24 dev eth1   # ip_reputation blacklist
        - ip addr add 203.0.113.50/24 dev eth1   # ip_reputation graylist
        - ip addr add 203.0.113.100/24 dev eth1  # probed_ips (VMess)
        - ip addr add 203.0.113.101/24 dev eth1  # probed_ips (Shadowsocks)
        - ip route replace default via 203.0.113.1

    # ── NIN Domestic Content Server ───────────────────────────────────────
    # Represents domestic services like Aparat or Rubika.
    # Connected DIRECTLY to tehran-ix (PEERING PLANE) — no path through tic-tehran.
    # Remains reachable during international transit shutdown (Jan 2026 behavior).
    aparat-server:
      kind: linux
      image: iran-sim:latest
      exec:
        - ip addr add 10.10.10.2/24 dev eth1
        - ip route replace default via 10.10.10.1

    # ── Android Mobile User (conditional) ────────────────────────────────
    client-android:
      kind: linux
      image: redroid/redroid:14.0.0-latest
      labels:
        containerlab.env.IRAN_MOBILE: "${IRAN_MOBILE}"
      cmd: sh -c 'if [ "${IRAN_MOBILE:-false}" = "true" ]; then sleep 5; exec /init.sh androidboot.use_memfd=1; else exec sleep infinity; fi'
      ports:
        - "5555:5555"
      binds:
        - config/mobile/EthernetOverlayReproducible.apk:/product/overlay/EthernetOverlay.apk:ro
      stages:
        configure:
          exec:
            - command: bash -c 'if [ "${IRAN_MOBILE:-false}" = "true" ]; then ./scripts/setup-mobile-net.sh; fi'
              target: host
              phase: on-exit

    # ── Web scrcpy (conditional) ──────────────────────────────────────────
    scrcpy-web:
      kind: linux
      image: shmayro/scrcpy-web:latest
      labels:
        containerlab.env.IRAN_MOBILE: "${IRAN_MOBILE}"
      cmd: sh -c 'if [ "${IRAN_MOBILE:-false}" = "true" ]; then sleep 30; adb connect clab-iran-filtering-client-android:5555 && npm start; else exec sleep infinity; fi'
      ports:
        - "8000:8000"

  links:
    # [client subnet]
    - endpoints: ["iran-client:eth1", "isp-shatel:eth1"]
    # [PEERING PLANE] isp-shatel <-> tehran-ix
    - endpoints: ["isp-shatel:eth2", "tehran-ix:eth1"]
    # [TRANSIT/PEERING handoff] tehran-ix <-> tic-tehran
    - endpoints: ["tehran-ix:eth2", "tic-tehran:eth1"]
    # [TRANSIT PLANE] tic-tehran <-> internet-srv
    - endpoints: ["tic-tehran:eth2", "internet-srv:eth1"]
    # [PEERING PLANE] tehran-ix <-> aparat-server (NIN directly connected, bypasses tic-tehran)
    - endpoints: ["tehran-ix:eth3", "aparat-server:eth1"]
    # [mobile subscriber]
    - endpoints: ["client-android:eth1", "isp-shatel:eth3"]
