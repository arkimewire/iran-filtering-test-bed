# Shatel ISP DNS server
# Forwards legitimate queries upstream via the backbone path.
# Queries traverse: Shatel -> TCI -> Tehran IX -> TIC Tehran -> real internet.

no-resolv

# Upstream DNS: TIC Tehran backbone's DNS forwarder
# Queries traverse: Shatel -> TCI (SR Linux) -> Tehran IX (bridge) -> TIC Tehran
server=10.2.1.1

# Load the shared blocklist
conf-file=/etc/dnsmasq.d/blocklist.conf

log-queries
log-facility=/var/log/dnsmasq.log
